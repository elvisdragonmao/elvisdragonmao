name: Update README

on:
  workflow_dispatch:
  schedule:
    - cron: "15 20 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TZ: Asia/Taipei
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update profile SVG
        run: node update-readme-number.js

      - name: Commit changes
        run: |
          if git diff --quiet -- profile.svg; then
            echo "No README assets changed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile.svg
          git commit -m "chore: update README stats"
          git push
